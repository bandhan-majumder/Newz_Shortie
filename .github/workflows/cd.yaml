name: Continuous Deployment to EC2

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to EC2
      env:
        PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        HOST: ${{ secrets.EC2_HOST }}
        USER: ${{ secrets.EC2_USER }}
      run: |
        echo "$PRIVATE_KEY" > private_key && chmod 600 private_key
        ssh -o StrictHostKeyChecking=no -i private_key ${USER}@${HOST}
          sudo apt update
          sudo apt install docker.io -y
          sudo systemctl start docker
          sudo usermod -aG docker ubuntu 
          docker pull bandhan99/newz_shortie:${{ github.sha }}
          docker stop shortie_contianer || true
          docker rm shortie_contianer || true
          docker run -d --name shortie_container -p 5000:5000 bandhan99/newz_shortie:${{ github.sha }}
